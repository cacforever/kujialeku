<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>酷家乐百问百答 · 博洛尼知识库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  min-height:100vh;
  background:url('背景.png') center/cover no-repeat fixed;
}
body::before{
  content:'';position:fixed;inset:0;
  background:rgba(0,0,0,.28);
  pointer-events:none;z-index:0;
}

/* 布局：左侧栏 + 右侧内容 */
.layout{display:flex;min-height:100vh;position:relative;z-index:1}

/* 左侧栏 */
.sidebar{
  width:180px;flex-shrink:0;
  background:rgba(0,0,0,.45);backdrop-filter:blur(16px);
  border-right:1px solid rgba(255,255,255,.08);
  padding:28px 0;
  display:flex;flex-direction:column;
}
.sidebar .logo{padding:0 18px 20px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:12px}
.sidebar .logo h2{font-size:16px;font-weight:300;color:#fff;letter-spacing:2px}
.sidebar .logo p{font-size:10px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:1px}
.sidebar-nav{flex:1;overflow-y:auto;padding:0 10px}
.sidebar-nav .cat{
  display:block;width:100%;text-align:left;
  padding:10px 12px;margin-bottom:4px;
  border:none;border-radius:8px;
  background:transparent;
  color:rgba(255,255,255,.6);
  font-size:13px;cursor:pointer;
  transition:all .2s;
  letter-spacing:.5px;
}
.sidebar-nav .cat:hover{background:rgba(255,255,255,.06);color:#fff}
.sidebar-nav .cat.active{background:rgba(255,255,255,.12);color:#fff;font-weight:500}

/* 主内容区 */
.main{flex:1;padding:20px 24px 80px;overflow-y:auto;max-height:100vh}
.main-header{text-align:center;padding:16px 0 12px}
.main-header h1{font-size:22px;font-weight:300;color:#fff;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,.5)}

.search-wrap{position:relative;margin:0 0 14px;max-width:600px;margin-left:auto;margin-right:auto}
.search-wrap input{
  width:100%;padding:12px 44px 12px 16px;
  border:1px solid rgba(255,255,255,.25);border-radius:24px;
  background:rgba(0,0,0,.3);color:#fff;
  font-size:15px;font-family:inherit;outline:none;
  transition:all .3s;backdrop-filter:blur(8px);
}
.search-wrap input::placeholder{color:rgba(255,255,255,.4)}
.search-wrap input:focus{
  border-color:rgba(255,255,255,.5);
  background:rgba(0,0,0,.45);
}
.search-wrap button{
  position:absolute;right:4px;top:4px;bottom:4px;width:38px;
  background:rgba(255,255,255,.15);border:none;border-radius:50%;
  color:#fff;font-size:16px;cursor:pointer;transition:all .2s;
}
.search-wrap button:hover{background:rgba(255,255,255,.3)}

.stats{text-align:center;font-size:12px;color:rgba(255,255,255,.45);margin-bottom:12px}
.result-list{list-style:none;max-width:640px;margin:0 auto}
.result-item{
  margin-bottom:8px;
  border:1px solid rgba(255,255,255,.08);border-radius:12px;
  background:rgba(0,0,0,.28);backdrop-filter:blur(12px);
  overflow:hidden;transition:all .3s;
}
.result-item.open{
  border-color:rgba(255,255,255,.25);
  background:rgba(0,0,0,.45);
}
.result-header{padding:12px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;user-select:none}
.result-header:active{background:rgba(255,255,255,.04)}
.result-number{flex-shrink:0;width:26px;height:26px;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.result-title{flex:1;font-size:14px;line-height:1.5;color:#fff}
.result-arrow{color:rgba(255,255,255,.3);font-size:11px;transition:transform .3s}
.result-item.open .result-arrow{transform:rotate(90deg)}
.result-body{display:none;padding:0 14px 14px 14px}
.result-item.open .result-body{display:block}
.result-body .answer{
  font-size:13px;line-height:1.8;color:rgba(255,255,255,.8);white-space:pre-wrap;
  background:rgba(255,255,255,.04);padding:12px 14px;border-radius:8px;
  border-left:2px solid rgba(255,255,255,.12);margin-bottom:10px;
}
.result-body .meta{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:6px}
.images-label{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:6px}
.images-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:8px}
.images-grid img{width:100%;border-radius:8px;border:1px solid rgba(255,255,255,.08);object-fit:contain;background:rgba(0,0,0,.15);max-height:160px;cursor:pointer;transition:transform .2s}
.images-grid img:hover{transform:scale(1.02)}
.images-grid .img-missing{width:100%;height:90px;border-radius:8px;border:1px solid rgba(255,255,255,.04);background:rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.1);font-size:10px}
.links a{display:block;font-size:12px;color:rgba(255,255,255,.5);text-decoration:none;padding:3px 0}
.links a:hover{color:#fff}
.tables{margin-top:8px;overflow-x:auto}
.tables table{border-collapse:collapse;font-size:10px;width:100%}
.tables td,.tables th{border:1px solid rgba(255,255,255,.08);padding:5px 6px;color:rgba(255,255,255,.6)}
.tables th{background:rgba(255,255,255,.04)}
.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.96);z-index:9999;justify-content:center;align-items:center;cursor:pointer}
.lightbox.show{display:flex}
.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px}
.lightbox-close{position:fixed;top:16px;right:20px;color:#fff;font-size:32px;z-index:10000;cursor:pointer}
.empty{padding:80px 20px;text-align:center;color:rgba(255,255,255,.2);font-size:14px}

@media(max-width:768px){
  .layout{flex-direction:column}
  .sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:10px}
  .sidebar .logo{display:none}
  .sidebar-nav{display:flex;gap:6px;flex-wrap:nowrap}
  .sidebar-nav .cat{white-space:nowrap;width:auto;padding:8px 14px;margin:0}
  .main{padding:12px}
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">
      <h2>BOLONI</h2>
      <p>知识库</p>
    </div>
    <nav class="sidebar-nav" id="cats"></nav>
  </aside>
  <main class="main">
    <div class="main-header">
      <h1>酷家乐百问百答</h1>
    </div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="输入关键词搜索..." autofocus>
      <button onclick="doSearch()">&#8963;</button>
    </div>
    <div class="stats" id="stats" style="display:none"></div>
    <ul id="resultList" class="result-list"></ul>
    <div id="empty" class="empty">选择左侧分类或输入关键词开始搜索</div>
  </main>
</div>

<script src="search_data.js"></script>
<script>
// 构建二级分类索引
var catMap = {};
var catList = [];

QA_DATA.forEach(function(e){
  var h2 = e.section_h2 || e.section_h1 || '其他';
  if (!catMap[h2]) { catMap[h2] = []; catList.push(h2); }
  catMap[h2].push(e);
});

// 按条目数降序排列
catList.sort(function(a,b){ return catMap[b].length - catMap[a].length; });

var activeCat = null;

function renderCats(){
  document.getElementById('cats').innerHTML = catList.map(function(c){
    var count = catMap[c].length;
    return '<button class="cat'+(activeCat===c?' active':'')+'" onclick="filterByCat(\''+escapeAttr(c)+'\')">'+escapeHtml(c)+'<small style="opacity:.5;margin-left:4px">'+count+'</small></button>';
  }).join('');
}
renderCats();

function filterByCat(cat){
  activeCat = activeCat===cat ? null : cat;
  renderCats();
  var q = document.getElementById('searchInput').value;
  var pool = activeCat ? catMap[activeCat].slice() : QA_DATA.slice();
  if (q.trim()){
    var qTokens = tokenize(q);
    pool = pool.filter(function(e){
      var text = (e.question+' '+e.answer+' '+(e.section_h1||'')+' '+(e.section_h2||'')).toLowerCase();
      return qTokens.every(function(t){return text.indexOf(t)>=0;});
    });
  }
  renderResults(pool,q);
}

function tokenize(text){
  return text.toLowerCase().replace(/[^\u4e00-\u9fa5a-z0-9]/g,' ').split(/\s+/).filter(function(t){return t.length>0;});
}

function doSearch(){
  activeCat = null; renderCats();
  var q = document.getElementById('searchInput').value;
  if (!q.trim()){
    document.getElementById('resultList').innerHTML='';
    document.getElementById('stats').style.display='none';
    document.getElementById('empty').style.display='block';
    document.getElementById('empty').textContent='选择左侧分类或输入关键词开始搜索';
    return;
  }
  var qTokens = tokenize(q);
  var results = QA_DATA.filter(function(e){
    var text = (e.question+' '+e.answer+' '+(e.section_h1||'')+' '+(e.section_h2||'')).toLowerCase();
    return qTokens.every(function(t){return text.indexOf(t)>=0;});
  });
  renderResults(results,q);
}

function renderResults(results,query){
  var list=document.getElementById('resultList');
  var stats=document.getElementById('stats');
  var empty=document.getElementById('empty');
  if(!query.trim()&&!activeCat){list.innerHTML='';stats.style.display='none';empty.style.display='block';return;}
  if(results.length===0){
    list.innerHTML='';stats.style.display='block';
    stats.textContent='未找到结果';
    empty.style.display='block';empty.textContent='试试其他关键词';
    return;
  }
  empty.style.display='none';stats.style.display='block';
  stats.textContent='共 '+results.length+' 条';
  list.innerHTML = results.map(function(r,i){
    var hi='',li='',ti='',mi='';
    if(r.section_h1){mi='<div class="meta">'+escapeHtml(r.section_h1)+(r.section_h2?' / '+escapeHtml(r.section_h2):'')+'</div>';}
    if(r.images&&r.images.length>0){
      hi='<div class="images-label">参考图 ('+r.images.length+')</div><div class="images-grid">';
      r.images.forEach(function(img){
        if(img.data_url) hi+='<img src="'+img.data_url+'" alt="'+img.name+'" loading="lazy" onclick="openLightbox(this.src);event.stopPropagation()">';
        else hi+='<div class="img-missing">缺失</div>';
      });
      hi+='</div>';
    }
    if(r.links&&r.links.length>0){
      li='<div class="links">';
      r.links.forEach(function(l){li+='<a href="'+escapeAttr(l)+'" target="_blank">'+escapeHtml(l)+'</a>';});
      li+='</div>';
    }
    if(r.tables&&r.tables.length>0){
      ti='<div class="tables">';
      r.tables.forEach(function(t){
        if(t&&t.length>0){
          ti+='<table>';
          t.forEach(function(row){ti+='<tr>';row.forEach(function(c){ti+='<td>'+escapeHtml(String(c))+'</td>';});ti+='</tr>';});
          ti+='</table>';
        }
      });
      ti+='</div>';
    }
    return '<li class="result-item" id="item-'+i+'">'
      +'<div class="result-header" onclick="toggleItem('+i+')">'
      +'<span class="result-number">'+(i+1)+'</span>'
      +'<span class="result-title">'+escapeHtml(r.question)+'</span>'
      +'<span class="result-arrow">&#9654;</span></div>'
      +'<div class="result-body">'+mi+'<div class="answer">'+escapeHtml(r.answer)+'</div>'+hi+li+ti+'</div></li>';
  }).join('');
}

function toggleItem(i){
  document.querySelectorAll('.result-item').forEach(function(el){if(el.id!=='item-'+i)el.classList.remove('open');});
  document.getElementById('item-'+i).classList.toggle('open');
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escapeAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

document.getElementById('searchInput').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});

function openLightbox(src){
  var lb=document.getElementById('lightbox');
  if(!lb){
    lb=document.createElement('div');lb.id='lightbox';lb.className='lightbox';
    lb.innerHTML='<span class="lightbox-close">&times;</span><img src="">';
    lb.onclick=function(e){if(e.target!==lb.querySelector('img'))closeLightbox();};
    lb.querySelector('.lightbox-close').onclick=closeLightbox;
    document.body.appendChild(lb);
  }
  lb.querySelector('img').src=src;lb.classList.add('show');
}
function closeLightbox(){var lb=document.getElementById('lightbox');if(lb)lb.classList.remove('show');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLightbox();});
</script>
</body>
</html>
