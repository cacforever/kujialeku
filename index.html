<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>酷家乐百问百答</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.header{position:sticky;top:0;z-index:100;background:#fff;padding:12px 16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.header h1{font-size:18px;font-weight:700;color:#222;margin-bottom:8px}
.search-box{display:flex;gap:8px}
.search-box input{flex:1;padding:10px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;outline:none;transition:border .2s}
.search-box input:focus{border-color:#4a90d9}
.search-box button{padding:10px 20px;background:#4a90d9;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap}
.search-box button:active{background:#357abd}
.stats{padding:10px 16px;font-size:13px;color:#888;background:#fafafa;border-bottom:1px solid #eee}
.result-list{list-style:none;padding:0}
.result-item{background:#fff;margin:0 0 1px;overflow:hidden}
.result-header{padding:14px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;user-select:none}
.result-header:active{background:#f8f8f8}
.result-number{flex-shrink:0;width:28px;height:28px;background:#e8f0fe;color:#4a90d9;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.result-title{flex:1;font-size:15px;line-height:1.5;color:#222}
.result-arrow{color:#bbb;font-size:14px;transition:transform .2s}
.result-item.open .result-arrow{transform:rotate(90deg)}
.result-body{display:none;padding:0 16px 16px 54px}
.result-item.open .result-body{display:block}
.result-body .answer{font-size:14px;line-height:1.8;color:#444;margin-bottom:12px;white-space:pre-wrap}
.result-body .meta{font-size:12px;color:#999;margin-bottom:8px}
.result-body .images-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:10px}
.result-body .images-grid img{width:100%;border-radius:8px;border:1px solid #eee;background:#fafafa;object-fit:contain;max-height:200px}
.result-body .images-grid img{cursor:pointer}
.result-body .images-grid .img-missing{width:100%;height:120px;border-radius:8px;border:1px solid #eee;background:#fafafa;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:12px}
/* 图片放大弹窗 */
.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:9999;justify-content:center;align-items:center;cursor:pointer}
.lightbox.show{display:flex}
.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:4px}
.lightbox-close{position:fixed;top:16px;right:20px;color:#fff;font-size:32px;z-index:10000;cursor:pointer;line-height:1}
.result-body .links{margin-top:8px}
.result-body .links a{display:block;font-size:13px;color:#4a90d9;text-decoration:none;padding:4px 0}
.result-body .links a:hover{text-decoration:underline}
.result-body .tables{margin-top:10px;overflow-x:auto}
.result-body .tables table{border-collapse:collapse;font-size:12px;width:100%}
.result-body .tables td,.result-body .tables th{border:1px solid #ddd;padding:6px 8px;text-align:left}
.result-body .tables th{background:#f5f5f5;font-weight:600}
.empty{padding:60px 20px;text-align:center;color:#bbb;font-size:16px}
.images-label{font-size:12px;color:#888;margin-bottom:6px;display:flex;align-items:center;gap:4px}
</style>
</head>
<body>
<div class="header">
  <h1>🔧 酷家乐百问百答</h1>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="输入关键词搜索…" autofocus>
    <button onclick="doSearch()">搜索</button>
  </div>
</div>
<div id="stats" class="stats" style="display:none"></div>
<ul id="resultList" class="result-list"></ul>
<div id="empty" class="empty">🔍 输入关键词开始搜索</div>

<script src="search_data.js"></script>
<script>
// 简单分词 + 搜索
function tokenize(text) {
  return text.toLowerCase().replace(/[^\u4e00-\u9fa5a-z0-9]/g,' ').split(/\s+/).filter(t=>t.length>0);
}

function search(query) {
  if (!query.trim()) return [];
  const qTokens = tokenize(query);
  const results = [];
  for (const entry of QA_DATA) {
    const text = (entry.question + ' ' + entry.answer + ' ' + (entry.section_h1||'') + ' ' + (entry.section_h2||'')).toLowerCase();
    let score = 0;
    for (const t of qTokens) {
      if (text.includes(t)) score += 1;
    }
    if (score > 0) results.push({...entry, score});
  }
  results.sort((a,b)=>b.score-a.score);
  return results;
}

function doSearch() {
  const q = document.getElementById('searchInput').value;
  const results = search(q);
  renderResults(results, q);
}

function renderResults(results, query) {
  const list = document.getElementById('resultList');
  const stats = document.getElementById('stats');
  const empty = document.getElementById('empty');

  if (!query.trim()) {
    list.innerHTML = '';
    stats.style.display = 'none';
    empty.style.display = 'block';
    empty.textContent = '🔍 输入关键词开始搜索';
    return;
  }

  if (results.length === 0) {
    list.innerHTML = '';
    stats.style.display = 'block';
    stats.textContent = '未找到相关结果';
    empty.style.display = 'block';
    empty.textContent = '😕 没有匹配的结果，试试其他关键词';
    return;
  }

  empty.style.display = 'none';
  stats.style.display = 'block';
  stats.textContent = `找到 ${results.length} 条结果`;

  list.innerHTML = results.map((r,i) => {
    const hasImages = r.images && r.images.length > 0;
    const hasLinks = r.links && r.links.length > 0;
    const hasTables = r.tables && r.tables.length > 0;
    return `<li class="result-item" id="item-${i}">
      <div class="result-header" onclick="toggleItem(${i})">
        <span class="result-number">${i+1}</span>
        <span class="result-title">${escapeHtml(r.question)}</span>
        <span class="result-arrow">▶</span>
      </div>
      <div class="result-body">
        ${r.section_h1 ? `<div class="meta">📂 ${escapeHtml(r.section_h1)}${r.section_h2 ? ' › ' + escapeHtml(r.section_h2) : ''}</div>` : ''}
        <div class="answer">${escapeHtml(r.answer)}</div>
        ${hasImages ? `<div class="images-label">🖼️ 参考图片 (${r.images.length})</div><div class="images-grid">${r.images.map(img => {
          if (img.data_url) return `<img src="${img.data_url}" alt="${img.name}" loading="lazy" onclick="openLightbox(this.src);event.stopPropagation()">`;
          return `<div class="img-missing">图片缺失</div>`;
        }).join('')}</div>` : ''}
        ${hasLinks ? `<div class="links">${r.links.map(l => `<a href="${escapeAttr(l)}" target="_blank">🔗 ${escapeHtml(l)}</a>`).join('')}</div>` : ''}
        ${hasTables ? `<div class="tables">${r.tables.map(t => {
          if (!t || t.length===0) return '';
          return '<table>' + t.map(row => '<tr>' + row.map(cell => `<td>${escapeHtml(String(cell))}</td>`).join('') + '</tr>').join('') + '</table>';
        }).join('')}</div>` : ''}
      </div>
    </li>`;
  }).join('');
}

function toggleItem(i) {
  document.querySelectorAll('.result-item').forEach(el => {
    if (el.id !== 'item-'+i) el.classList.remove('open');
  });
  document.getElementById('item-'+i).classList.toggle('open');
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escapeAttr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// 回车搜索
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

// 图片放大弹窗
function openLightbox(src) {
  let lb = document.getElementById('lightbox');
  if (!lb) {
    lb = document.createElement('div');
    lb.id = 'lightbox';
    lb.className = 'lightbox';
    lb.innerHTML = '<span class="lightbox-close">&times;</span><img src="">';
    lb.onclick = function(e) {
      if (e.target !== this.querySelector('img')) closeLightbox();
    };
    lb.querySelector('.lightbox-close').onclick = closeLightbox;
    document.body.appendChild(lb);
  }
  lb.querySelector('img').src = src;
  lb.classList.add('show');
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  if (lb) lb.classList.remove('show');
}

// ESC 关闭
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
</script>
</body>
</html>
